{%define "tasks.html"%}
{%template "header" .%}
<main class="max-w-7xl mx-auto px-4 sm:px-6 py-6" id="app">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-gray-800">已注册任务</h1>
      <p class="text-sm text-gray-500 mt-1">Worker 上报的任务类型列表，可用于工作流编排</p>
    </div>
    <span class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">共 {{ tasks.length }} 个</span>
  </div>

  <div v-if="tasks.length === 0" class="bg-white rounded-xl shadow-sm border border-gray-200 px-5 py-12 text-center text-gray-400">
    <div class="text-4xl mb-3">📋</div>
    <p class="text-sm">暂无已注册的任务类型</p>
    <p class="text-xs mt-1">请先启动 Worker 注册任务</p>
  </div>

  <div v-else class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    <div v-for="t in tasks" :key="t.name" class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <div class="flex items-center justify-between mb-3">
        <div>
          <div class="font-semibold text-gray-800 text-base">{{ t.name }}</div>
          <div v-if="t.description" class="text-xs text-gray-400 mt-0.5">{{ t.description }}</div>
        </div>
        <span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700">任务类型</span>
      </div>
      <template v-if="t.params && t.params.length > 0">
        <div class="border-t border-gray-100 pt-3">
          <div class="text-xs font-medium text-gray-500 mb-2">参数定义（{{ t.params.length }} 个）</div>
          <div class="space-y-2">
            <div v-for="p in t.params" :key="p.key" class="bg-gray-50 rounded-lg px-3 py-2">
              <div class="flex items-center gap-2 mb-1">
                <code class="text-xs font-mono text-indigo-600 bg-indigo-50 px-1.5 py-0.5 rounded">{{ p.key }}</code>
                <span class="text-xs font-medium text-gray-700">{{ p.label }}</span>
                <span v-if="p.required" class="text-[10px] px-1.5 py-0.5 rounded bg-red-100 text-red-600 font-medium">必填</span>
                <span class="px-1.5 py-0.5 rounded text-[10px] bg-gray-100 text-gray-500">{{ p.type || 'text' }}</span>
              </div>
              <div v-if="p.placeholder" class="text-[10px] text-gray-400">占位: {{ p.placeholder }}</div>
              <div v-if="p.description" class="text-[10px] text-gray-400 mt-0.5">{{ p.description }}</div>
              <div v-if="p.default !== null && p.default !== undefined" class="text-[10px] text-gray-400">默认值: {{ p.default }}</div>
              <div v-if="p.options && p.options.length > 0" class="flex flex-wrap gap-1 mt-1">
                <span v-for="o in p.options" :key="o.value" class="text-[10px] px-1.5 py-0.5 rounded bg-white border border-gray-200 text-gray-500">{{ o.label }} = {{ o.value }}</span>
              </div>
            </div>
          </div>
        </div>
      </template>
      <div v-else class="border-t border-gray-100 pt-3 text-xs text-gray-400">无参数定义</div>
    </div>
  </div>
</main>

<script>
const { createApp } = Vue;
createApp({
  data() {
    return { tasks: [] };
  },
  mounted() { this.load(); },
  methods: {
    async load() {
      try {
        const res = await fetch('/api/v1/tasks');
        const json = await res.json();
        if (json.code === 0 && json.data) {
          this.tasks = json.data;
        }
      } catch (e) {
        console.error('加载任务列表失败', e);
      }
    }
  }
}).mount('#app');
</script>
{%template "footer" .%}
{%end%}
